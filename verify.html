<!DOCTYPE html>
<html>
<head>
<title>Verify TSE Passport</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat&display=swap" rel="stylesheet">
<style>
    :root { --gold: #D4AF37; --black: #0A0A0A; }
    body { font-family: 'Montserrat'; background: var(--black); color: var(--gold); padding: 20px; text-align: center; }
    h1 { font-family: 'Cinzel'; }
   .card { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--gold); max-width: 500px; margin: 20px auto; }
   .valid { color: #00FF00; font-size: 24px; font-weight: bold; }
   .invalid { color: #FF0000; font-size: 24px; font-weight: bold; }
   .detail { text-align: left; margin: 10px 0; }
   .photo { width: 120px; height: 140px; border: 3px solid var(--gold); object-fit: cover; margin: 15px auto; display: block; }
</style>
</head>
<body>
    <h1>👑 TEAM SINGLE EMPIRE 👑</h1>
    <h2>PASSPORT VERIFICATION</h2>
    <div class="card" id="result">Loading...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAlPDa0MAN4DdZT9rhlUQ0ukPAq5KFgkU",
    authDomain: "team-single-empire.firebaseapp.com",
    databaseURL: "https://team-single-empire-default-rtdb.firebaseio.com",
    projectId: "team-single-empire",
    storageBucket: "team-single-empire.firebasestorage.app",
    messagingSenderId: "1012663695661",
    appId: "1:1012663695661:web:46703b21c5db6205063ba4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const passportNo = new URLSearchParams(window.location.search).get('no');

  if (!passportNo) {
    document.getElementById('result').innerHTML = '<p class="invalid">❌ NO PASSPORT NUMBER PROVIDED</p>';
  } else {
    get(child(ref(db), 'citizens/' + passportNo)).then((snap) => {
        if (snap.exists()) {
          const c = snap.val();
          document.getElementById('result').innerHTML = `
            <p class="valid">✅ VERIFIED CITIZEN</p>
            ${c.photo? `<img src="${c.photo}" class="photo">` : ''}
            <div class="detail"><b>PASSPORT NO:</b> ${c.no}</div>
            <div class="detail"><b>NAME:</b> ${c.jina.toUpperCase()}</div>
            <div class="detail"><b>EMBASSY:</b> ${c.embassy.toUpperCase()}</div>
            <div class="detail"><b>LAST BETRAYAL:</b> ${c.oshwa}</div>
            <div class="detail"><b>DECREED:</b> ${c.date}</div>
          `;
        } else {
          document.getElementById('result').innerHTML = '<p class="invalid">❌ FAKE PASSPORT</p>';
        }
      });
  }
</script>
</body>
</html>
